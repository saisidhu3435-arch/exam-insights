kind = "web"
previewPath = "/"
title = "Minute Ahead"
version = "1.0.0"
id = "artifacts/minute-ahead"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24078

[services.development]
run = "pnpm --filter @workspace/minute-ahead run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/minute-ahead", "run", "build" ]
publicDir = "artifacts/minute-ahead/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24078"
BASE_PATH = "/"
